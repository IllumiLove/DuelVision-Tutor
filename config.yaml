capture:
  target_window: "masterduel"
  interval: 1.0
  fast_interval: 0.5
  base_resolution: [1920, 1080]

ocr:
  engine: "paddleocr"
  language: "ch"
  use_gpu: true

llm:
  provider: "deepseek"
  deepseek:
    model: "deepseek-chat"
    base_url: "https://api.deepseek.com"
    max_tokens: 2048
    temperature: 0.3
  ollama:
    model: "qwen2.5:7b"
    base_url: "http://localhost:11434"

overlay:
  opacity: 0.88
  width: 420
  height: 500
  font_size: 14
  position: "right"

logger:
  enabled: true
  max_matches: 100
  history_context: 3

database:
  auto_update: true
  update_interval_days: 7

deck:
  active: "吸血鬼60刻魔哥布林"
